
<!DOCTYPE html>
<!-- DOCTYPE 声明：告诉浏览器这是 HTML5 标准文档 -->
<html lang="en">
  <!-- lang="en" 告诉浏览器和屏幕阅读器页面使用英文（便于国际化） -->
  <head>
    <!-- <head> 区域包含页面的元数据（不直接显示在页面上），影响浏览器和搜索引擎的行为 -->

    <!-- charset：字符编码声明，UTF-8 支持所有 Unicode 字符（中文、emoji 等） -->
    <meta charset="UTF-8" />

    <!-- viewport：移动端适配
         width=device-width  — 页面宽度等于设备屏幕宽度（不缩小）
         initial-scale=1.0   — 初始缩放比例为 1（不缩放）
         这两个参数防止页面在手机上被缩小导致文字太小 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 浏览器标签页显示的标题 -->
    <title>AI Desmos</title>

    <!-- 内联样式：确保 React 的根元素撑满整个视口
         html, body: 高度 100%，不留空白边距
         #root: React 应用挂载的 div，同样撑满高度（让 Desmos 画板铺满全屏） -->
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>

  <body>
    <!-- <body> 区域是页面实际显示的内容 -->

    <!-- React 应用的挂载点
         id="root" 是约定俗成的名称，与 src/main.tsx 中的 document.getElementById("root") 对应
         React 会把整个应用渲染到这个空 div 里 -->
    <div id="root"></div>

    <!-- 引入 React 应用的入口脚本
         type="module" 表示这是 ES Module 格式（支持 import/export）
         src="/src/main.tsx" 指向 React 的入口文件
         Vite 开发服务器会实时编译 TypeScript，生产构建时会打包成 JS 文件 -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
